<div class="jumbotron">
    <div class="racetypes-content">
        <div class="panel panel-default">
            <div class="panel-heading" style="display: flex; justify-content: space-between; align-items: center;">
                <h4 style="margin: 0;"><i class="fa fa-users"></i> User Management</h4>
                <button class="btn btn-success" ng-click="addUser()" style="font-weight: 600;">
                    <i class="fa fa-plus-circle"></i> Add User
                </button>
            </div>
            <div class="panel-body" style="padding: 0;">
                <!-- Filters row -->
                <div style="padding: 10px 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <label style="margin: 0; font-weight: 600;">Role:</label>
                        <select class="form-control input-sm" ng-model="roleFilter"
                            ng-options="role for role in rolesList" style="width: 120px;">
                        </select>
                    </div>
                    <div style="display: flex; align-items: center; gap: 5px; flex: 1; min-width: 200px;">
                        <label style="margin: 0; font-weight: 600;">Search:</label>
                        <div style="position: relative; flex: 1;">
                            <input type="text" class="form-control input-sm" ng-model="searchQuery"
                                ng-model-options="{debounce: 150}"
                                placeholder="Filter by username or email..." style="padding-right: 25px;">
                            <span class="fa fa-times-circle hoverhand"
                                ng-show="searchQuery"
                                ng-click="searchQuery=''"
                                style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #999;"></span>
                        </div>
                    </div>
                    <div style="color: #888; font-size: 0.9em;">
                        {{(usersList | filter:userFilter).length}} users
                    </div>
                </div>
                <table class="table table-striped table-hover" style="margin-bottom: 0;">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Member</th>
                            <th>Created</th>
                            <th style="width: 80px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr ng-if="(usersList | filter:userFilter).length === 0">
                            <td colspan="6" class="text-center text-muted" style="padding: 40px;">
                                <i class="fa fa-info-circle"></i>
                                <span ng-if="usersList.length === 0">No users found.</span>
                                <span ng-if="usersList.length > 0">No users match the current filters.</span>
                            </td>
                        </tr>
                        <tr ng-repeat="u in usersList | filter:userFilter | orderBy:'username'">
                            <td>{{u.username}}</td>
                            <td>{{u.email}}</td>
                            <td>
                                <span class="label"
                                    ng-class="{'label-danger': u.role === 'admin', 'label-warning': u.role === 'captain', 'label-default': u.role === 'user'}">
                                    {{u.role}}
                                </span>
                            </td>
                            <td>
                                <a ng-if="u.member" ui-sref="/members({member: u.member.username})">
                                    {{u.member.firstname}} {{u.member.lastname}}
                                </a>
                                <span ng-if="!u.member" class="text-muted">-</span>
                            </td>
                            <td>{{u.createdAt | date:'yyyy-MM-dd':'UTC'}}</td>
                            <td class="text-center" style="white-space: nowrap;">
                                <i class="fa fa-pencil hoverhand" ng-click="editUser(u)"
                                    title="Edit user" style="margin-right: 8px;"></i>
                                <i class="fa fa-trash hoverhand" ng-click="removeUser(u)"
                                    title="Delete user"></i>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
